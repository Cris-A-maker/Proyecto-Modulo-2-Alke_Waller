<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!--wallet-->
    <script src="/Proyectos/alke wallet/assets/js/wallet.js"></script>

    <!--bootstrap-->
    <link href="https://cdn.jsdelivir.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!--estilos-->
    <link rel="stylesheet" href="/Proyectos/alke wallet/assets/css/alke_wallet.css">
</head>

<body>
    <header>
        <h1 class="text-center">Alke Wallet</h1>
    </header>


    <section class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div id="mensaje"></div>
                <h2 class="text-center mb-4">Login</h2>
                <form id="form-login">
                    <div class="mb-3">
                        <label for="usuario" class="form-label">Usuario</label>
                        <input type="text" name="usuario" class="form-control" id="usuario"
                            placeholder="Ingrese su usuario" required>
                    </div>

                    <div class="mb-3">
                        <label for="contraseña" class="form-label">Contraseña</label>
                        <input type="password" name="contraseña" class="form-control" id="contraseña"
                            placeholder="Ingrese su contraseña" required>
                    </div>

                    <div class="mt-5">
                        <button class="btn btn-success w-100">Iniciar Sesión</button>
                    </div>
                </form>
                <div>
                    <p class="text-center pt-3">¿No tienes cuenta?
                        <a href="register.html">Regístrate</a>
                    </p>
                </div>
            </div>
        </div>
    </section>



    <footer>
        <p class="text-center">@2026 alke wallet Cristian Altamirano</p>
    </footer>

    <!--bootstrap-->
    <script src="https://cdn.jsdelivir.net/npm/bootstrap@5.3.8/dist/css/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById('form-login').addEventListener('submit', function (event) {
            event.preventDefault();

            const usuario = document.getElementById('usuario').value;
            const contraseña = document.getElementById('contraseña').value;

            const usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];

            const usuarioEncontrado = usuarios.find(function (user) {
                return user.usuario === usuario && user.contraseña === contraseña;
            });


            if (usuarioEncontrado) {
                localStorage.setItem('usuarioLogueado', JSON.stringify(usuarioEncontrado));

                document.getElementById("mensaje").innerHTML = `
            <div class="alert alert-success alert-dismissible fade show">
                Inicio de sesión exitoso, 
                Redirigiendo...
                <button type="button" class="btn-close"
                data-bs-dismiss="alert"></button>
                </div>
            `;

                setTimeout(function () {
                    window.location.href = 'menu.html';
                }, 3000);

            } else {

                document.getElementById("mensaje").innerHTML = `
            <div class="alert alert-danger alert-dismissible fade show">
                Usuario y/o contraseña incorrectos.
                <button type="button" class="btn-close"
                data-bs-dismiss="alert"></button>
                </div>
            `;
                setTimeout(function () {
                    document.getElementById("mensaje").innerHTML = "";
                }, 3000);
            }
        });

        function login(usuario, password) {
            const u = String(usuario || "")
                .trim()
                .toLowerCase();
            const p = String(password || "").trim();

            const user = findUser(u);
            const ok = !!u && u.pass === p;

            if (ok) {
                localStorage.setItem(LS.logged, "true");
                localStorage.setItem(LS.user, e);
                ensureUserWallet(e);
            }
            return ok;
        }
    </script>
</body>

</html>
