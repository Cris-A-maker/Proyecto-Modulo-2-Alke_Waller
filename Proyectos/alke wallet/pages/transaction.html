<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction</title>

    <!--font awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!--wallet-->
    <script src="/Proyectos/alke wallet/assets/js/wallet.js"></script>

    <!--bootstrap-->
    <link href="https://cdn.jsdelivir.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!--estilos-->
    <link rel="stylesheet" href="/Proyectos/alke wallet/assets/css/alke_wallet.css">
</head>

<body>
    <header class="d-flex justify-content-between align-items-center">
        <a href="menu.html" class="btn btn-success"><i class="fa-solid fa-reply"></i></a>
        <h1 class="text-center">Transacciónes</h1>
        <button id="logout" class="btn btn-danger">
            <i class="fa-solid fa-power-off"></i>
        </button>
    </header>


    <main class="container floating-actions">
        <div class="card card-soft p-2">
            <div class="list-group list-group-flush" id="txt_List"></div>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3 gap-2">
            <button class="btn btn-outline-secondary d-flex align-items-center gap-1" id="prev_Page" type="button">
                <i class="bi bi-arrow-left"></i>
                Anterior
            </button>

            <div class="small-muted">
                Página <span id="page_Num">1</span> / <span id="page_Total">1</span>
            </div>

            <button class="btn btn-outline-secondary d-flex align-items-center gap-1" id="next_Page" type="button">
                Siguiente
                <i class="bi bi-arrow-right"></i>
            </button>
        </div>
        <div style="height: 80px"></div>
    </main>






    <footer>
        <p class="text-center">@2026 alke wallet Cristian Altamirano</p>
    </footer>

    <script src="https://cdn.jsdelivir.net/npm/bootstrap@5.3.8/dist/css/bootstrap.bundle.min.js"></script>


    <script>
        //proteger vista
        const usuarioLogueado = localStorage.getItem("usuarioLogueado");
        if (!usuarioLogueado) {
            window.location = "login.html"
        }

        //cerrar sesion
        document.getElementById("logout").addEventListener("click", function () {
            localStorage.removeItem("usuarioLogueado");
            window.location.href = "login.html"
        });


        $(function () {
            renderBalance("#balanceTx");

            const PAGE_SIZE = 15;
            const tx = getTx() || [];

            let page = 1; // partir en 1
            const totalPages = Math.max(1, Math.ceil(tx.length / PAGE_SIZE));

            const $list = $("#txt_List");
            const $prev = $("#prev_Page");
            const $next = $("#next_Page");
            const $pageNum = $("#page_Num");
            const $pageTotal = $("#page_Total");

            $pageTotal.text(total_Pages);

            function renderPage() {
                $list.empty();

                $list.removeClass("tx-fade");
                void $list[0].offsetWidth;
                $list.addClass("tx-fade");

                if (tx.length === 0) {
                    $list.append(
                        `<div class="p-3 small-muted">No hay movimientos aún.</div>`
                    );
                    $prev.prop("disabled", true);
                    $next.prop("disabled", true);
                    $pageNum.text(1);
                    $pageTotal.text(1);
                    return;
                }

                const start = (page - 1) * PAGE_SIZE;
                const end = start + PAGE_SIZE;
                const slice = tx.slice(start, end);

                slice.forEach((t) => {
                    const date = new Date(t.date).toLocaleString("es-CL");
                    const isTransfer = (t.type || "").toLowerCase().includes("transferencia");
                    const sign = isTransfer ? "-" : "+";
                    const amountClass = isTransfer ? "text-danger" : "text-success";

                    $list.append(`
        <div class="list-group-item">
        <div class="d-flex justify-content-between">
            <div>
            <strong>${t.type}</strong>
            <div class="small-muted">${t.detail || ""}</div>
            <div class="small-muted">${date}</div>
            </div>
            <strong class="${amountClass}">
            ${sign} ${moneyCLP(t.amount)}
            </strong>
        </div>
        </div>
    `);
                });

                //page info
                $pageNum.text(page);

                // Enable/disable buttons
                $prev.prop("disabled", page <= 1);
                $next.prop("disabled", page >= totalPages);
            }
            // Eventos
            $prev.on("click", function () {
                if (page > 1) {
                    page--;
                    renderPage();
                    window.scrollTo({ top: 0, behavior: "smooth" });
                }
            });
            $next.on("click", function () {
                if (page < totalPages) {
                    page++;
                    renderPage();
                    window.scrollTo({ top: 0, behavior: "smooth" });
                }
            });
            renderPage();
        });
    </script>
</body>
</html>
