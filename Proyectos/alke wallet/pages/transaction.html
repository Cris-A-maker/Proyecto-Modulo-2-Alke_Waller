<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction</title>

    <!--font awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!--wallet-->
    <script src="/Proyectos/alke wallet/assets/js/wallet.js"></script>

    <!--bootstrap-->
    <link href="https://cdn.jsdelivir.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!--estilos-->
    <link rel="stylesheet" href="/Proyectos/alke wallet/assets/css/alke_wallet.css">
</head>

<body>
    <header class="d-flex justify-content-between align-items-center">
        <a href="menu.html" class="btn btn-success"><i class="fa-solid fa-reply"></i></a>
        <h1 class="text-center">Transacciónes</h1>
        <button id="logout" class="btn btn-danger">
            <i class="fa-solid fa-power-off"></i>
        </button>
    </header>


    <main class="container floating-actions">
        <div class="card card-soft p-2">
            <div class="list-group list-group-flush" id="txt_List"></div>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3 gap-2">
            <button class="btn btn-outline-secondary d-flex align-items-center gap-1" id="prevPage" type="button">
                <i class="bi bi-arrow-left"></i>
                Anterior
            </button>

            <div class="small-muted">
                Página <span id="page_Num">1</span> / <span id="page_Total">1</span>
            </div>

            <button class="btn btn-outline-secondary d-flex align-items-center gap-1" id="next_Page" type="button">
                Siguiente
                <i class="bi bi-arrow-right"></i>
            </button>
        </div>
        <div style="height: 80px"></div>
    </main>






    <footer>
        <p class="text-center">@2026 alke wallet Cristian Altamirano</p>
    </footer>

    <script src="https://cdn.jsdelivir.net/npm/bootstrap@5.3.8/dist/css/bootstrap.bundle.min.js"></script>


    <script>
        //proteger vista
        const usuarioLogueado = localStorage.getItem("usuarioLogueado");
        if (!usuarioLogueado) {
            window.location = "login.html"
        }

        //cerrar sesion
        document.getElementById("logout").addEventListener("click", function () {
            localStorage.removeItem("usuarioLogueado");
            window.location.href = "login.html"
        });
    </script>
</body>

</html>
